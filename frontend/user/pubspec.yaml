name: b2205946_duonghuuluan_luanvan
description: "Ứng dụng bán nón bảo hiểm - Luận văn tốt nghiệp"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  provider: ^6.1.5+1
  go_router: ^17.0.1
  flutter_secure_storage: ^10.0.0 # lưu trữ Token JWT
  flutter_dotenv: ^6.0.0
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1
  app_links: ^6.4.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  web_socket_channel: ^3.0.3
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^19.2.1
  flutter_launcher_icons: ^0.14.4
  record: ^6.2.0
  get_it: ^9.2.1
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.8
  retrofit: ^4.4.2
  json_annotation: ^4.12.0
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  retrofit_generator: ^10.2.6
  json_serializable: ^6.13.2
  build_runner: ^2.15.0
flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/logo.webp
    - assets/images/banner1.webp
    - assets/images/banner2.webp
    - assets/images/banner3.webp
    - assets/images/banner4.webp
    - assets/images/logo_royalStore.png
    - assets/images/logo_royalStore2.png
    - assets/images/1-2.webp
    - assets/images/3-4.webp
    - assets/images/fullface.webp
    - assets/images/lat_ham.png
    - assets/images/tre-em.png
    - assets/images/xe-dap.png
    - assets/images/bg.webp
    - assets/images/MBH_1_2.webp
    - assets/images/MBH_3_4.webp
    - assets/images/MBH_fullface.webp
    - assets/images/MBH_KID.webp
    - assets/images/M139h.webp
    - assets/images/M239-1.webp

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo_royalStore2.png"
  min_sdk_android: 21
  adaptive_icon_foreground: "assets/images/logo_royalStore2.png" # Ảnh logo chính
